<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoWord</title>
  <link rel="stylesheet" href="style.css">
  <link rel="apple-touch-icon" href="icon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192"  href="icon/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon/android-chrome-512x512.png">
  <link rel="icon" href="icon/favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="16x16" href="icon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icon/favicon-32x32.png">
  <link rel="manifest" href="icon/site.webmanifest">
  
</head>
<body>
  <div class="hd">
    <header>
      <div class="button" style="display: flex" aria-label="rules">
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path d="M8 15A7 7 0 1 0 8 1a7 7 0 0 0 0 14zM8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0z"/>
          <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533l1.002-4.705c.138-.645-.064-1.106-.75-1.02z"/>
          <path d="M8 5.5a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/>
        </svg>
      </div>
      <div class="button" style="display: flex" aria-label="new">
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path d="M8 15A7 7 0 1 0 8 1a7 7 0 0 0 0 14zM8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0z"/>
          <path d="M8 4a.5.5 0 0 1 .5.5V7.5H11.5a.5.5 0 0 1 0 1H8.5V11.5a.5.5 0 0 1-1 0V8.5H4.5a.5.5 0 0 1 0-1H7.5V4.5A.5.5 0 0 1 8 4z"/>
        </svg>
      </div>
      <div class="flex-auto text-center">
        <h1 class="tracking-wider">CryptoWord</h1>
      </div>
      <div class="button" style="display: flex" aria-label="stat">
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path d="M0 0h1v15h15v1H0V0z"/>
          <path d="M2 13h2V7H2v6zm4 0h2V3H6v10zm4 0h2V9h-2v4zm4 0h2V5h-2v8z"/>
        </svg>
      </div>
      <div class="button" style="display: flex" aria-label="settings">
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.12.872l-.31-.17c-1.275-.7-2.722.746-2.022 2.022l.17.31c.446.82.023 1.841-.872 2.12l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.12l-.17.31c-.7 1.275.746 2.722 2.022 2.022l.31-.17a1.464 1.464 0 0 1 2.12.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.12-.872l.31.17c1.275.7 2.722-.746 2.022-2.022l-.17-.31a1.464 1.464 0 0 1 .872-2.12l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.12l.17-.31c.7-1.275-.746-2.722-2.022-2.022l-.31.17a1.464 1.464 0 0 1-2.12-.872l-.1-.34zM8 10.93A2.93 2.93 0 1 1 8 5.07a2.93 2.93 0 0 1 0 5.86z"/>
        </svg>
      </div>
    </header>
  </div>
  <div id="game">
    <!-- Игровое поле -->
    <div id="board" class="board"></div>
  
    <!-- Экранная клавиатура -->
    <div id="keyboard" class="keyboard">
      <!-- Буквы будут добавлены динамически -->
    </div>
  </div>
  
  <!-- Модальное окно -->
  <div id="myModal" class="modal">
    <div class="fullscreen"></div>
    <div class="modal-content">
      <span class="close">
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
        </svg>
      </span>
      <h2 id="modal-head"></h2>
      <div id="modal-info"></div>
    </div>
  </div>
  
  <!-- Контейнер фейерверков -->
  <div id="fireworks-container"></div>
  
  <script src="const.js"></script>
  <script src="misc.js"></script>
  <script src="stats.js"></script>
  <script src="script.js"></script>
</body>
</html>
